name: Deploy EC2 Dashboard

on:
  workflow_dispatch:
    inputs:
      ENVIRONMENT:
        description: 'Environment identifier'
        required: true
        default: 'mypersonalAWS'
      REGION:
        description: 'AWS region'
        required: true
        default: 'us-east-2'
      BUCKET_NAME:
        description: 'S3 bucket name (blank => derived)'
        required: false
        default: ''
      ACTION:
        description: 'Select Terraform action'
        required: true
        type: choice
        default: 'apply'
        options: [plan, apply, destroy]
      TEAM_PUBLIC_IP:
        description: 'Public IP (with /32) to allow via WAF (e.g. 203.0.113.45/32). Leave blank to disable WAF.'
        required: false
        default: ''
      ENABLE_CF_BASIC_AUTH:
        description: 'Protect with CloudFront Basic Auth (true/false)'
        required: true
        default: 'true'

env:
  AWS_MAX_ATTEMPTS: 10

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.ACTION }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.ENVIRONMENT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ github.event.inputs.REGION }}

      - name: Generate terraform.auto.tfvars
        run: |
          echo 'aws_region  = "${{ github.event.inputs.REGION }}"'      >> terraform.auto.tfvars
          echo 'bucket_name = "${{ github.event.inputs.BUCKET_NAME }}"' >> terraform.auto.tfvars

          # --- CloudFront Basic Auth ---
          echo 'enable_cf_basic_auth = ${{ github.event.inputs.ENABLE_CF_BASIC_AUTH }}' >> terraform.auto.tfvars
          if [ "${{ github.event.inputs.ENABLE_CF_BASIC_AUTH }}" = "true" ]; then
            echo 'cf_basic_auth_b64 = "${{ secrets.CF_BASIC_AUTH_B64 }}"' >> terraform.auto.tfvars
          else
            echo 'cf_basic_auth_b64 = ""' >> terraform.auto.tfvars
          fi

          # --- WAF allow-list (only if TEAM_PUBLIC_IP provided) ---
          if [ -n "${{ github.event.inputs.TEAM_PUBLIC_IP }}" ]; then
            echo 'team_cidrs = ["${{ github.event.inputs.TEAM_PUBLIC_IP }}"]' >> terraform.auto.tfvars
          else
            echo 'team_cidrs = []' >> terraform.auto.tfvars
          fi

          # Optional: quick API login while wiring SSM params
          # echo 'auth_fallback = "admin:Password123!"' >> terraform.auto.tfvars

      - name: Terraform Init (remote backend)
        run: |
          terraform init \
            -backend-config="bucket=tfstate-pnamilak" \
            -backend-config="key=state/terraform.tfstate" \
            -backend-config="region=${{ github.event.inputs.REGION }}" \
            -backend-config="dynamodb_table=terraform-ec2-dashboard-lock" \
            -backend-config="encrypt=true"

      - name: Terraform ${{ github.event.inputs.ACTION }}
        run: |
          case "${{ github.event.inputs.ACTION }}" in
            plan)
              terraform plan
              ;;
            apply)
              terraform apply -auto-approve
              ;;
            destroy)
              terraform destroy -auto-approve
              ;;
          esac
